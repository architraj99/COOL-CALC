<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator | COOL CALC</title>
    <link rel="stylesheet" href="../css/scientific.css">
</head>
<body>

    <header>
        <a href="../index.html" class="back-link">← Back Home</a>
        <h1>Scientific Calculator</h1>
    </header>

    <main>

        <div class="calculator">

            <div class="display" id="display">0</div>

            <div class="buttons">

                <button data-action="clear">C</button>
                <button data-action="delete">DEL</button>
                <button data-action="pi">π</button>
                <button data-value="/">÷</button>

                <button data-action="sin">sin</button>
                <button data-action="cos">cos</button>
                <button data-action="tan">tan</button>
                <button data-value="*">×</button>

                <button data-action="log">log</button>
                <button data-action="sqrt">√</button>
                <button data-action="square">x²</button>
                <button data-value="-">-</button>

                <button data-value="7">7</button>
                <button data-value="8">8</button>
                <button data-value="9">9</button>
                <button data-value="+">+</button>

                <button data-value="4">4</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>
                <button data-action="e">e</button>

                <button data-value="1">1</button>
                <button data-value="2">2</button>
                <button data-value="3">3</button>
                <button data-action="equals">=</button>

                <button class="zero" data-value="0">0</button>
                <button data-value=".">.</button>

            </div>

        </div>

    </main>
    
    <script src="../js/scientific.js"></script>

</body>
</html>
